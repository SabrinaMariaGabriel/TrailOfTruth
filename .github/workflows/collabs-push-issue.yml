name: Create issue on push to collabs

on:
  push:
    branches:
      - collabs

permissions:
  issues: write
  contents: read

jobs:
  create_issue:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create an issue for this push
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.actor;
            const branch = context.ref.replace('refs/heads/', '');
            const sha = context.sha.substring(0,7);
            const message = context.payload.head_commit.message;
            const compare = context.payload.compare;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Push auf ${branch} von ${actor} (${sha})`,
              body: `
Ein Push auf **${branch}** wurde durchgeführt.

- Wer: @${actor}
- Commit: ${sha}
- Message: ${message}
- Compare: ${compare}

Dieses Issue wurde automatisch erstellt.
              `,
              labels: ['collabs-activity']
            });
